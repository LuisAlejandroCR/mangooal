[profile.default]
src = "contracts"
out = "out"
libs = ["lib"]
solc = "0.8.24"
optimizer = true
optimizer_runs = 200
remappings = [
  "@openzeppelin/=lib/openzeppelin-contracts/"
]

[rpc_endpoints]
celo        = "https://forno.celo.org"

[etherscan]
celo        = { key = "${ETHERSCAN_API_KEY}", url = "https://api.celoscan.io/api", chain = 42220 }

