[profile.default]
src = "contracts"
out = "out"
libs = ["lib"]
solc = "0.8.24"
optimizer = true
optimizer_runs = 200
remappings = [
  "@openzeppelin/=lib/openzeppelin-contracts/"
]

[rpc_endpoints]
celo        = "https://forno.celo.org"
celo-ankr   = "https://rpc.ankr.com/celo"
celo-drpc   = "https://celo.drpc.org"

[etherscan]
celo          = { key = "unused", url = "https://api.celoscan.io/api", chain = 42220 }
celo-sourcify = { key = "unused", url = "https://sourcify.dev/server/",  chain = 42220 }

